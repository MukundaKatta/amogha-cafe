<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>POS | Amogha Cafe</title>
<meta name="theme-color" content="#0f1117">
<link rel="icon" type="image/png" href="../amogha-logo.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
    --bg:#0f1117;--bg2:#1a1d27;--bg3:#22263a;
    --gold:#D4A017;--gold-d:#b8860b;
    --txt:#e8e8f0;--txt2:#9a9ab0;--txt3:#5a5a70;
    --grn:#27ae60;--red:#e74c3c;--blue:#3498db;
    --r:10px;--ease:cubic-bezier(.4,0,.2,1)
}
html,body{height:100%;overflow:hidden;font-family:'Poppins',sans-serif;background:var(--bg);color:var(--txt);-webkit-font-smoothing:antialiased}

/* ── Login Screen ─────────────────────────────────────────── */
#pos-login{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;
    background:var(--bg);z-index:1000}
.login-box{background:var(--bg2);border:1px solid rgba(212,160,23,.15);border-radius:20px;
    padding:40px;width:340px;text-align:center}
.login-logo{width:70px;height:70px;border-radius:50%;background:#D4A017;padding:4px;
    object-fit:contain;margin:0 auto 16px}
.login-title{font-size:1.3rem;font-weight:700;color:var(--gold);margin-bottom:4px}
.login-sub{font-size:.85rem;color:var(--txt2);margin-bottom:24px}
.login-input{width:100%;padding:12px 16px;background:var(--bg3);border:1.5px solid rgba(212,160,23,.2);
    border-radius:var(--r);color:var(--txt);font-size:.95rem;outline:none;transition:border-color .2s;
    box-sizing:border-box;margin-bottom:10px}
.login-input:focus{border-color:var(--gold)}
.login-input::placeholder{color:var(--txt3)}
.login-btn{width:100%;margin-top:14px;padding:14px;background:linear-gradient(135deg,var(--gold),var(--gold-d));
    color:#080604;font-weight:700;font-size:1rem;border:none;border-radius:var(--r);cursor:pointer;transition:opacity .2s}
.login-btn:hover{opacity:.9}
.login-err{color:var(--red);font-size:.82rem;margin-top:10px;min-height:18px}

/* ── Main POS Layout ──────────────────────────────────────── */
#pos-main{display:none;position:fixed;inset:0;flex-direction:column}
#pos-main.show{display:flex}
.pos-header{display:flex;align-items:center;gap:12px;padding:10px 16px;
    background:var(--bg2);border-bottom:1px solid rgba(212,160,23,.1);flex-shrink:0}
.pos-header-logo{width:36px;height:36px;border-radius:50%;background:var(--gold);padding:3px;object-fit:contain}
.pos-shop-name{font-size:1rem;font-weight:700;color:var(--gold)}
.pos-header-time{margin-left:auto;font-size:.8rem;color:var(--txt2);font-family:monospace}
.pos-logout{padding:6px 14px;background:rgba(231,76,60,.12);border:1px solid rgba(231,76,60,.25);
    color:var(--red);border-radius:8px;cursor:pointer;font-size:.8rem;font-weight:600;transition:all .2s}
.pos-logout:hover{background:rgba(231,76,60,.22)}

.pos-body{display:flex;flex:1;overflow:hidden;min-height:0}

/* ── Category Column ──────────────────────────────────────── */
.pos-cats{width:110px;flex-shrink:0;overflow-y:auto;background:var(--bg2);
    border-right:1px solid rgba(255,255,255,.06);padding:8px 6px;scrollbar-width:none}
.pos-cats::-webkit-scrollbar{display:none}
.pos-cat-btn{width:100%;padding:10px 6px;border:none;background:none;color:var(--txt2);
    font-size:11.5px;font-weight:500;border-radius:10px;cursor:pointer;transition:all .2s;
    text-align:center;margin-bottom:2px;line-height:1.3}
.pos-cat-btn:hover{background:rgba(255,255,255,.06);color:var(--txt)}
.pos-cat-btn.active{background:rgba(212,160,23,.15);color:var(--gold);font-weight:700}
.pos-cat-count{display:block;font-size:10px;color:var(--txt3);margin-top:2px}
.pos-cat-btn.active .pos-cat-count{color:rgba(212,160,23,.7)}

/* ── Menu Column ──────────────────────────────────────────── */
.pos-menu-col{flex:1;display:flex;flex-direction:column;overflow:hidden}
.pos-search-bar{padding:10px 12px;border-bottom:1px solid rgba(255,255,255,.05);flex-shrink:0}
.pos-search-bar input{width:100%;padding:9px 14px;background:var(--bg3);border:1px solid rgba(255,255,255,.08);
    border-radius:8px;color:var(--txt);font-size:.9rem;outline:none;transition:border-color .2s}
.pos-search-bar input::placeholder{color:var(--txt3)}
.pos-search-bar input:focus{border-color:rgba(212,160,23,.4)}
.pos-menu-grid{flex:1;overflow-y:auto;padding:10px 12px;
    display:grid;grid-template-columns:repeat(3,1fr);gap:10px;align-content:start}
.pos-item{background:var(--bg2);border:1px solid rgba(255,255,255,.07);border-radius:12px;
    padding:12px 10px;cursor:pointer;transition:all .15s;user-select:none;position:relative;
    display:flex;flex-direction:column;gap:6px}
.pos-item:hover{background:var(--bg3);border-color:rgba(212,160,23,.3);transform:translateY(-1px)}
.pos-item:active{transform:scale(.97)}
.pos-item-img{width:100%;height:80px;object-fit:cover;border-radius:8px;margin-bottom:2px}
.pos-item-name{font-size:.82rem;font-weight:600;color:var(--txt);line-height:1.3}
.pos-item-price{font-size:.95rem;font-weight:700;color:var(--gold)}
.pos-item-badge{position:absolute;top:8px;right:8px;font-size:.6rem;padding:2px 6px;border-radius:6px;
    font-weight:700;background:var(--gold);color:#080604}
.pos-item-type{width:10px;height:10px;border-radius:50%;flex-shrink:0;
    border:1.5px solid currentColor;display:inline-block;margin-right:4px}
.pos-item-type.veg{color:var(--grn)}
.pos-item-type.nv{color:var(--red)}
.pos-item-meta{display:flex;align-items:center;font-size:.7rem;color:var(--txt3)}
.pos-item.in-cart{border-color:rgba(212,160,23,.5);background:rgba(212,160,23,.05)}
.pos-item-footer{display:flex;align-items:center;justify-content:space-between;margin-top:6px}
.pos-item-add{width:30px;height:30px;border-radius:50%;border:none;
    background:linear-gradient(135deg,var(--gold),var(--gold-d));
    color:#080604;font-size:1.2rem;font-weight:700;cursor:pointer;
    display:flex;align-items:center;justify-content:center;
    transition:transform .15s,box-shadow .15s;flex-shrink:0}
.pos-item-add:hover{transform:scale(1.12);box-shadow:0 2px 8px rgba(212,160,23,.4)}
.pos-item-add:active{transform:scale(.95)}
.pos-item-qc{display:flex;align-items:center;gap:4px}
.pos-item-qc button{width:28px;height:28px;border-radius:8px;border:none;cursor:pointer;
    font-size:.95rem;font-weight:700;display:flex;align-items:center;justify-content:center;
    transition:all .12s}
.pos-item-qc .piq-minus{background:rgba(231,76,60,.14);color:var(--red)}
.pos-item-qc .piq-minus:hover{background:rgba(231,76,60,.28)}
.pos-item-qc .piq-plus{background:rgba(39,174,96,.14);color:var(--grn)}
.pos-item-qc .piq-plus:hover{background:rgba(39,174,96,.28)}
.pos-item-qc .piq-num{min-width:24px;text-align:center;font-size:.88rem;font-weight:700;color:var(--gold)}
.pos-empty{grid-column:1/-1;text-align:center;color:var(--txt3);padding:40px 20px;font-size:.9rem}

/* ── Order Column ─────────────────────────────────────────── */
.pos-order-col{width:0;flex-shrink:0;display:flex;flex-direction:column;overflow:hidden;
    border-left:none;background:var(--bg2);transition:width .25s cubic-bezier(.4,0,.2,1)}
.pos-order-col.has-items{width:320px;border-left:1px solid rgba(255,255,255,.06);
    overflow:hidden}
.pos-order-header{padding:12px 16px;border-bottom:1px solid rgba(255,255,255,.06);
    display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.pos-order-title{font-size:.95rem;font-weight:700;color:var(--txt)}
.pos-clear-btn{padding:4px 10px;background:rgba(231,76,60,.1);border:1px solid rgba(231,76,60,.2);
    color:var(--red);border-radius:6px;cursor:pointer;font-size:.75rem;font-weight:600}
.pos-clear-btn:hover{background:rgba(231,76,60,.2)}
/* Scrollable wrapper: cart list + footer scroll together; footer sticks to bottom */
.pos-order-scroll{flex:1;min-height:0;overflow-y:auto;display:flex;flex-direction:column;
    scrollbar-width:thin;scrollbar-color:rgba(212,160,23,.2) transparent}
.pos-order-scroll::-webkit-scrollbar{width:4px}
.pos-order-scroll::-webkit-scrollbar-thumb{background:rgba(212,160,23,.2);border-radius:2px}
.pos-cart-list{flex:1;padding:8px}
.pos-cart-empty{display:flex;align-items:center;justify-content:center;height:100%;
    color:var(--txt3);font-size:.85rem;text-align:center;padding:20px}
.pos-cart-item{display:flex;align-items:center;gap:8px;padding:9px 8px;border-radius:10px;
    border-bottom:1px solid rgba(255,255,255,.04);transition:background .15s}
.pos-cart-item:hover{background:rgba(255,255,255,.03)}
.pos-ci-name{flex:1;font-size:.82rem;font-weight:500;color:var(--txt);line-height:1.3}
.pos-ci-price{font-size:.8rem;color:var(--txt2);min-width:50px;text-align:right}
.pos-qty-ctrl{display:flex;align-items:center;gap:4px}
.pos-qty-btn{width:26px;height:26px;border-radius:6px;border:none;cursor:pointer;
    font-size:.9rem;font-weight:700;display:flex;align-items:center;justify-content:center;transition:all .15s}
.pos-qty-btn.minus{background:rgba(231,76,60,.12);color:var(--red)}
.pos-qty-btn.minus:hover{background:rgba(231,76,60,.25)}
.pos-qty-btn.plus{background:rgba(39,174,96,.12);color:var(--grn)}
.pos-qty-btn.plus:hover{background:rgba(39,174,96,.25)}
.pos-qty-num{min-width:28px;width:28px;text-align:center;font-size:.85rem;font-weight:700;color:var(--txt);background:none;border:none;border-bottom:1.5px solid rgba(212,160,23,0.3);border-radius:0;padding:0;cursor:text;font-family:'Poppins',sans-serif;-moz-appearance:textfield;}
.pos-qty-num::-webkit-inner-spin-button,.pos-qty-num::-webkit-outer-spin-button{-webkit-appearance:none;}
.pos-qty-num:focus{outline:none;border-bottom-color:var(--gold);}

.pos-order-footer{padding:12px 14px;border-top:1px solid rgba(255,255,255,.06);flex-shrink:0;
    position:sticky;bottom:0;background:var(--bg2);z-index:2}
.pos-customer-row{display:flex;gap:8px;margin-bottom:6px}
.pos-customer-row input{flex:1;padding:8px 10px;background:var(--bg3);border:1px solid rgba(255,255,255,.08);
    border-radius:8px;color:var(--txt);font-size:.8rem;outline:none}
.pos-customer-row input:focus{border-color:rgba(212,160,23,.4)}
.pos-customer-row input::placeholder{color:var(--txt3)}
.pos-cust-badge{min-height:20px;margin-bottom:8px;font-size:.75rem}
.pos-cust-badge .badge-found{color:#4caf50;background:rgba(76,175,80,.1);border:1px solid rgba(76,175,80,.2);
    padding:3px 10px;border-radius:12px;display:inline-block}
.pos-cust-badge .badge-new{color:#D4A017;background:rgba(212,160,23,.08);border:1px solid rgba(212,160,23,.2);
    padding:3px 10px;border-radius:12px;display:inline-block}
.pos-cust-badge .badge-loading{color:#888;font-style:italic}
.pos-loyalty-row{margin-bottom:8px;display:none}
.pos-redeem-btn{width:100%;padding:9px 12px;background:linear-gradient(135deg,#4caf50,#388e3c);color:#fff;
    border:none;border-radius:8px;font-size:.82rem;font-weight:700;cursor:pointer;transition:opacity .2s}
.pos-redeem-btn:hover{opacity:.88}
.pos-redeemed-tag{display:inline-flex;align-items:center;gap:6px;background:rgba(76,175,80,.12);
    border:1px solid rgba(76,175,80,.3);color:#4caf50;padding:6px 12px;border-radius:8px;font-size:.8rem;font-weight:600;width:100%;justify-content:space-between}
.pos-redeemed-tag button{background:none;border:none;color:#e57373;cursor:pointer;font-size:.85rem;padding:0}
.pos-total-row{display:flex;justify-content:space-between;align-items:center;
    padding:8px 0;border-top:1px solid rgba(255,255,255,.06);margin-bottom:10px}
.pos-total-label{font-size:.85rem;color:var(--txt2)}
.pos-total-amount{font-size:1.3rem;font-weight:700;color:var(--gold)}
.pos-pay-methods{display:flex;gap:6px;margin-bottom:10px}
.pos-pay-btn{flex:1;padding:9px 6px;border-radius:8px;border:1.5px solid rgba(255,255,255,.1);
    background:var(--bg3);color:var(--txt2);font-size:.78rem;font-weight:600;cursor:pointer;transition:all .2s;text-align:center}
.pos-pay-btn.active{border-color:var(--gold);color:var(--gold);background:rgba(212,160,23,.1)}
.pos-notes-row{margin-top:6px}
        .pos-notes-row input{width:100%;padding:7px 10px;background:var(--bg2);border:1px solid rgba(212,160,23,0.2);border-radius:8px;color:var(--txt);font-size:.8rem;font-family:'Poppins',sans-serif;box-sizing:border-box}
        .pos-notes-row input:focus{outline:none;border-color:rgba(212,160,23,0.5)}
        .pos-sales-counter{cursor:default;gap:1px}
        .pos-place-footer{padding:10px 14px;border-top:1px solid rgba(255,255,255,.06);flex-shrink:0;
    background:var(--bg2);padding-bottom:calc(10px + env(safe-area-inset-bottom,0px))}
body.light-mode .pos-place-footer{background:var(--bg2);border-color:rgba(0,0,0,.07)}
.pos-place-btn{width:100%;padding:14px;background:linear-gradient(135deg,var(--gold),var(--gold-d));
    color:#080604;font-weight:700;font-size:1rem;border:none;border-radius:var(--r);cursor:pointer;
    transition:opacity .2s;letter-spacing:.02em}
.pos-place-btn:hover{opacity:.9}
.pos-place-btn:disabled{opacity:.5;cursor:not-allowed}

/* ── Success / Bill ───────────────────────────────────────── */
#pos-bill-overlay{position:fixed;inset:0;background:rgba(0,0,0,.8);z-index:500;
    display:none;align-items:center;justify-content:center}
#pos-bill-overlay.show{display:flex}
.pos-bill-box{background:#fff;color:#111;border-radius:12px;width:320px;max-height:90vh;
    overflow-y:auto;padding:24px 20px;font-family:monospace}
.bill-header{text-align:center;margin-bottom:16px}
.bill-shop{font-size:1.1rem;font-weight:700;margin-bottom:2px}
.bill-sub{font-size:.75rem;color:#555}
.bill-divider{border:none;border-top:1px dashed #ccc;margin:10px 0}
.bill-row{display:flex;justify-content:space-between;font-size:.8rem;padding:2px 0}
.bill-row.total{font-weight:700;font-size:.95rem;border-top:1px solid #ccc;padding-top:8px;margin-top:4px}
.bill-row.label{color:#555;font-size:.72rem}
.bill-actions{display:flex;flex-wrap:wrap;gap:8px;margin-top:16px}
.bill-print-btn,.bill-new-btn,.bill-wa-btn{flex:1 1 calc(50% - 4px);min-width:calc(50% - 4px);
    padding:10px;border:none;border-radius:8px;font-weight:700;cursor:pointer;font-size:.82rem;text-align:center}
.bill-print-btn{background:#111;color:#fff}
.bill-new-btn{background:var(--gold);color:#080604}
.bill-wa-btn{background:#25d366;color:#fff}
.bill-close-btn{position:absolute;top:10px;right:12px;background:none;border:none;font-size:1.4rem;
    color:#777;cursor:pointer;line-height:1;padding:4px}
.bill-close-btn:hover{color:#111}
.pos-bill-box{position:relative}

/* ── Light Mode ───────────────────────────────────────────── */
body.light-mode{
    --bg:#f4efe6;--bg2:#fffaf3;--bg3:#ede6da;
    --txt:#1a1208;--txt2:#5a4a30;--txt3:#9a8870;
}
body.light-mode #pos-login{background:var(--bg)}
body.light-mode .login-box{background:var(--bg2);border-color:rgba(212,160,23,.3);
    box-shadow:0 4px 24px rgba(0,0,0,.08)}
body.light-mode .pin-input{background:var(--bg3);border-color:rgba(212,160,23,.3);color:var(--txt)}
body.light-mode .pos-header{background:var(--bg2);border-color:rgba(212,160,23,.2)}
body.light-mode .pos-cats{background:var(--bg2);border-color:rgba(0,0,0,.08)}
body.light-mode .pos-cat-btn:hover{background:rgba(0,0,0,.06)}
body.light-mode .pos-cat-btn.active{background:rgba(212,160,23,.18);color:var(--gold-d)}
body.light-mode .pos-search-bar{border-color:rgba(0,0,0,.07)}
body.light-mode .pos-search-bar input{background:var(--bg3);border-color:rgba(0,0,0,.1);color:var(--txt)}
body.light-mode .pos-item{background:var(--bg2);border-color:rgba(0,0,0,.08)}
body.light-mode .pos-item:hover{background:#fff;border-color:rgba(212,160,23,.4)}
body.light-mode .pos-item.in-cart{border-color:rgba(212,160,23,.6);background:rgba(212,160,23,.06)}
body.light-mode .pos-item-name{color:var(--txt)}
body.light-mode .pos-order-col.has-items{background:var(--bg2);border-color:rgba(0,0,0,.08)}
body.light-mode .pos-order-header{border-color:rgba(0,0,0,.07)}
body.light-mode .pos-order-title{color:var(--txt)}
body.light-mode .pos-cart-item{border-color:rgba(0,0,0,.05)}
body.light-mode .pos-cart-item:hover{background:rgba(0,0,0,.03)}
body.light-mode .pos-ci-name{color:var(--txt)}
body.light-mode .pos-qty-num{color:var(--txt)}
body.light-mode .pos-order-footer{border-color:rgba(0,0,0,.07)}
body.light-mode .pos-customer-row input{background:var(--bg3);border-color:rgba(0,0,0,.1);color:var(--txt)}
body.light-mode .pos-pay-btn{background:var(--bg3);border-color:rgba(0,0,0,.1);color:var(--txt2)}
body.light-mode .pos-pay-btn.active{border-color:var(--gold);color:var(--gold-d);background:rgba(212,160,23,.1)}
body.light-mode .pos-total-row{border-color:rgba(0,0,0,.07)}
body.light-mode .pos-cart-bar{background:linear-gradient(to top,rgba(244,239,230,.98),rgba(244,239,230,.9));
    border-color:rgba(212,160,23,.25)}
body.light-mode .pos-header-time{color:var(--txt2)}
body.light-mode html,body.light-mode body{background:var(--bg)}

/* ── Recent Orders Panel ───────────────────────────────────── */
.pos-recent-btn{padding:6px 12px;background:rgba(212,160,23,.1);border:1.5px solid rgba(212,160,23,.25);
    color:var(--gold);border-radius:8px;cursor:pointer;font-size:.78rem;font-weight:600;
    display:flex;align-items:center;gap:5px;transition:all .2s;flex-shrink:0;white-space:nowrap}
.pos-recent-btn:hover{background:rgba(212,160,23,.2)}
.pos-recent-panel{position:fixed;top:0;right:0;height:100vh;width:380px;
    background:var(--bg2);border-left:1px solid rgba(212,160,23,.15);
    display:flex;flex-direction:column;z-index:400;
    transform:translateX(100%);transition:transform .3s cubic-bezier(.16,1,.3,1);
    box-shadow:-8px 0 32px rgba(0,0,0,.3)}
.pos-recent-panel.open{transform:translateX(0)}
.pos-recent-head{display:flex;align-items:center;justify-content:space-between;
    padding:14px 16px;border-bottom:1px solid rgba(255,255,255,.07);flex-shrink:0}
.pos-recent-title{font-size:1rem;font-weight:700;color:var(--txt)}
.pos-recent-close{background:none;border:none;color:var(--txt2);font-size:1.4rem;
    cursor:pointer;padding:0 4px;line-height:1}
.pos-recent-close:hover{color:var(--txt)}
.pos-recent-filters{display:flex;gap:6px;padding:10px 14px;border-bottom:1px solid rgba(255,255,255,.05);flex-shrink:0}
.pos-rf-btn{padding:5px 12px;border-radius:20px;border:1px solid rgba(255,255,255,.1);
    background:none;color:var(--txt2);font-size:.75rem;font-weight:600;cursor:pointer;transition:all .2s}
.pos-rf-btn.active{background:rgba(212,160,23,.15);border-color:var(--gold);color:var(--gold)}
.pos-recent-list{flex:1;min-height:0;overflow-y:auto;padding:10px 12px;
    display:flex;flex-direction:column;gap:8px;scrollbar-width:thin;
    scrollbar-color:rgba(212,160,23,.2) transparent}
.pos-ro-card{background:var(--bg3);border:1px solid rgba(255,255,255,.06);
    border-radius:12px;padding:12px 14px;cursor:default;transition:border-color .2s}
.pos-ro-card:hover{border-color:rgba(212,160,23,.2)}
.pos-ro-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px}
.pos-ro-id{font-size:.78rem;font-weight:700;color:var(--gold);font-family:monospace}
.pos-ro-time{font-size:.72rem;color:var(--txt3)}
.pos-ro-customer{font-size:.85rem;font-weight:600;color:var(--txt);margin-bottom:4px}
.pos-ro-items{font-size:.75rem;color:var(--txt3);margin-bottom:8px;
    white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.pos-ro-bottom{display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.pos-ro-total{font-size:.9rem;font-weight:700;color:var(--txt);margin-right:auto}
.pos-ro-status{padding:3px 8px;border-radius:20px;font-size:.68rem;font-weight:700}
.pos-ro-status.pending{background:rgba(243,156,18,.15);color:#f39c12}
.pos-ro-status.confirmed{background:rgba(52,152,219,.15);color:#3498db}
.pos-ro-status.preparing{background:rgba(155,89,182,.15);color:#9b59b6}
.pos-ro-status.ready{background:rgba(39,174,96,.15);color:#27ae60}
.pos-ro-status.delivered{background:rgba(127,140,141,.15);color:#7f8c8d}
.pos-ro-status.cancelled{background:rgba(231,76,60,.15);color:#e74c3c}
.pos-ro-status.voided{background:rgba(150,50,50,.15);color:#c0392b}
.pos-ro-void{padding:4px 10px;border-radius:6px;border:1px solid rgba(231,76,60,.3);
    background:none;color:#e74c3c;font-size:.72rem;font-weight:600;cursor:pointer;
    transition:all .15s;margin-left:4px}
.pos-ro-void:hover{background:rgba(231,76,60,.12)}
.pos-ro-pay{padding:3px 8px;border-radius:20px;font-size:.68rem;font-weight:600;
    background:rgba(255,255,255,.06);color:var(--txt2)}
.pos-ro-type{padding:3px 7px;border-radius:20px;font-size:.66rem;font-weight:600;
    background:rgba(52,152,219,.12);color:#3498db}
.pos-ro-reprint{padding:4px 10px;border-radius:6px;border:1px solid rgba(212,160,23,.3);
    background:none;color:var(--gold);font-size:.72rem;font-weight:600;cursor:pointer;
    transition:all .15s;margin-left:auto}
.pos-ro-reprint:hover{background:rgba(212,160,23,.15)}
.pos-recent-empty{flex:1;display:flex;align-items:center;justify-content:center;
    color:var(--txt3);font-size:.85rem;text-align:center;padding:40px 20px}
.pos-recent-loading{flex:1;display:flex;align-items:center;justify-content:center;
    color:var(--txt3);font-size:.85rem}
/* light mode overrides */
body.light-mode .pos-recent-panel{background:var(--bg2);border-color:rgba(0,0,0,.1);
    box-shadow:-8px 0 32px rgba(0,0,0,.12)}
body.light-mode .pos-recent-head{border-color:rgba(0,0,0,.07)}
body.light-mode .pos-ro-card{background:var(--bg3);border-color:rgba(0,0,0,.07)}
body.light-mode .pos-ro-card:hover{border-color:rgba(212,160,23,.3)}
body.light-mode .pos-ro-pay{background:rgba(0,0,0,.06);color:var(--txt2)}

/* ── Mode Toggle Button ────────────────────────────────────── */
.pos-mode-btn{width:34px;height:34px;border-radius:50%;border:1.5px solid rgba(212,160,23,.3);
    background:var(--bg3);color:var(--txt2);font-size:1rem;cursor:pointer;
    display:flex;align-items:center;justify-content:center;transition:all .2s;flex-shrink:0}
.pos-mode-btn:hover{border-color:var(--gold);color:var(--gold)}

/* ── Proceed to Checkout bar ──────────────────────────────── */
.pos-checkout-bar{padding:12px 16px;flex-shrink:0;cursor:pointer;
    position:sticky;bottom:0;background:var(--bg2);z-index:2;margin-top:auto}
.pos-checkout-bar-inner{display:flex;align-items:center;justify-content:space-between;
    background:linear-gradient(135deg,var(--gold),var(--gold-d));
    border-radius:12px;padding:13px 18px;transition:opacity .15s}
.pos-checkout-bar-inner:hover{opacity:.88}
.pos-checkout-total{font-size:1rem;font-weight:800;color:#080604}
.pos-checkout-cta{font-size:.85rem;font-weight:700;color:#080604}

/* ── Print styles ─────────────────────────────────────────── */
#print-area{display:none}
@media print{
    body *{visibility:hidden}
    #print-area,#print-area *{visibility:visible}
    #print-area{display:block!important;position:fixed;top:0;left:0;width:80mm;
        padding:8mm 6mm;font-family:monospace;color:#000;background:#fff}
}

/* ── Mobile cart bar ──────────────────────────────────────── */
.pos-cart-bar{display:none;position:fixed;bottom:0;left:0;right:0;z-index:200;
    padding:10px 16px calc(10px + env(safe-area-inset-bottom,0px));
    background:linear-gradient(to top,rgba(15,17,23,.98),rgba(15,17,23,.9));
    border-top:1px solid rgba(212,160,23,.15)}
.pos-cart-bar-inner{display:flex;align-items:center;justify-content:space-between;
    background:linear-gradient(135deg,var(--gold),var(--gold-d));
    border-radius:14px;padding:13px 18px;cursor:pointer}
.pos-cart-bar-label{font-size:.9rem;font-weight:700;color:#080604}
.pos-cart-bar-total{font-size:.9rem;font-weight:700;color:#080604}

/* ── Responsive ───────────────────────────────────────────── */
@media(max-width:900px){
    .pos-menu-grid{grid-template-columns:repeat(2,1fr)}
    /* Tablets 641-900px: narrower side panel, stays beside menu */
    .pos-order-col.has-items{width:260px}
    .pos-recent-panel{width:100%}
}
@media(max-width:640px){
    .pos-cats{width:80px}
    .pos-cat-btn{font-size:10px;padding:8px 4px}
    .pos-menu-grid{gap:8px;padding:8px}
    .pos-recent-btn span{display:none}
    /* Phones: fullscreen slide-up overlay */
    .pos-order-col,.pos-order-col.has-items{
        position:fixed;inset:0;width:100%;overflow:hidden;border-left:none;
        z-index:300;transform:translateY(100%);
        transition:transform .35s cubic-bezier(.16,1,.3,1)}
    .pos-order-col.mobile-open{transform:translateY(0)}
    .pos-cart-bar{display:block}
    .pos-body{padding-bottom:70px}
}
</style>
</head>
<body>

<!-- Login -->
<div id="pos-login">
    <div class="login-box">
        <img class="login-logo" src="../amogha-logo.png" alt="Logo">
        <div class="login-title">POS Terminal</div>
        <div class="login-sub">Sign in to your kiosk terminal</div>
        <input class="login-input" type="text" id="pos-username" placeholder="Username"
            autocomplete="username" autocapitalize="off" autocorrect="off" spellcheck="false"
            onkeydown="if(event.key==='Enter')document.getElementById('pos-password').focus()">
        <input class="login-input" type="password" id="pos-password" placeholder="Password"
            autocomplete="current-password"
            onkeydown="if(event.key==='Enter')posLogin()">
        <button class="login-btn" id="pos-login-btn" onclick="posLogin()">Login</button>
        <div class="login-err" id="pos-login-err"></div>
    </div>
</div>

<!-- Main POS -->
<div id="pos-main">
    <!-- Header -->
    <div class="pos-header">
        <img class="pos-header-logo" src="../amogha-logo.png" id="pos-logo" alt="">
        <div>
            <div class="pos-shop-name" id="pos-shop-name">Loading...</div>
            <div style="font-size:.7rem;color:var(--txt2)">POS Terminal</div>
        </div>
        <div class="pos-header-time" id="pos-clock"></div>
        <div class="pos-sales-counter" id="pos-sales-counter" style="display:none">
            <div id="pos-sales-total" style="font-size:.8rem;font-weight:700;color:var(--gold)">₹0</div>
            <div style="font-size:.6rem;color:var(--txt2);line-height:1">today</div>
        </div>
        <button class="pos-recent-btn" onclick="toggleRecentOrders()">📋 <span>Recent Orders</span></button>
        <button class="pos-mode-btn" id="pos-mode-btn" onclick="togglePosMode()" title="Toggle light/dark mode">☾</button>
        <button class="pos-logout" onclick="posLogout()">Logout</button>
    </div>

    <div class="pos-body">
        <!-- Categories -->
        <div class="pos-cats" id="pos-cats"></div>

        <!-- Menu -->
        <div class="pos-menu-col">
            <div class="pos-search-bar">
                <input type="text" id="pos-search" placeholder="🔍  Search items..." oninput="debouncedRenderMenu()">
            </div>
            <div class="pos-menu-grid" id="pos-menu-grid"></div>
        </div>

        <!-- Order -->
        <div class="pos-order-col" id="pos-order-col">
            <div class="pos-order-header">
                <div class="pos-order-title">Order <span id="pos-item-count" style="color:var(--txt2);font-weight:500;font-size:.8rem"></span></div>
                <div style="display:flex;gap:8px;align-items:center">
                    <button class="pos-clear-btn" onclick="clearCart()">Clear</button>
                    <button onclick="closeMobileCart()" style="background:none;border:none;color:var(--txt2);font-size:1.3rem;cursor:pointer;padding:0 4px;line-height:1" title="Close">&times;</button>
                </div>
            </div>
            <div class="pos-order-scroll">
                <div class="pos-cart-list" id="pos-cart-list">
                    <div class="pos-cart-empty">Cart is empty<br>Tap items to add</div>
                </div>
                <div class="pos-checkout-bar" id="pos-checkout-bar" style="display:none" onclick="showPosCheckout()">
                    <div class="pos-checkout-bar-inner">
                        <span class="pos-checkout-total" id="pos-checkout-total">₹0</span>
                        <span class="pos-checkout-cta">Proceed to Checkout →</span>
                    </div>
                </div>
                <div class="pos-order-footer" id="pos-order-footer" style="display:none">
                    <div class="pos-customer-row">
                        <input type="tel" id="pos-cust-phone" placeholder="Phone (for WhatsApp bill)" maxlength="10" inputmode="numeric" oninput="lookupCustomer(this.value)">
                        <input type="text" id="pos-table" placeholder="Table #" style="max-width:72px">
                    </div>
                    <div class="pos-cust-badge" id="pos-cust-badge"></div>
                    <div class="pos-loyalty-row" id="pos-loyalty-row"></div>
                    <div class="pos-customer-row" style="margin-bottom:8px">
                        <input type="text" id="pos-cust-name" placeholder="Customer name">
                    </div>
                    <div class="pos-pay-methods">
                        <button class="pos-pay-btn active" onclick="selectPay('Cash',this)">💵 Cash</button>
                        <button class="pos-pay-btn" onclick="selectPay('UPI',this)">📲 UPI</button>
                        <button class="pos-pay-btn" onclick="selectPay('Card',this)">💳 Card</button>
                    </div>
                    <div class="pos-notes-row">
                        <input type="text" id="pos-order-notes" placeholder="📝 Notes (extra spicy, no onion…)" maxlength="120">
                    </div>
                    <div class="pos-total-row">
                        <span class="pos-total-label">Total</span>
                        <span class="pos-total-amount" id="pos-total">₹0</span>
                    </div>
                </div>
            </div>
            <!-- Place Order pinned at bottom of column, always visible -->
            <div class="pos-place-footer" id="pos-place-footer" style="display:none">
                <button class="pos-place-btn" id="pos-place-btn" onclick="placeOrder()" disabled>Place Order</button>
            </div>
        </div>
    </div>

    <!-- Mobile floating cart bar -->
    <div class="pos-cart-bar" id="pos-cart-bar" onclick="openMobileCart()" style="display:none">
        <div class="pos-cart-bar-inner">
            <span class="pos-cart-bar-label" id="pos-cart-bar-label">View Cart</span>
            <span class="pos-cart-bar-total" id="pos-cart-bar-total">₹0</span>
        </div>
    </div>
</div>

<!-- Recent Orders Panel -->
<div class="pos-recent-panel" id="pos-recent-panel">
    <div class="pos-recent-head">
        <div class="pos-recent-title">Recent Orders</div>
        <button class="pos-recent-close" onclick="toggleRecentOrders()">&times;</button>
    </div>
    <div class="pos-recent-filters">
        <button class="pos-rf-btn active" onclick="setRecentFilter('all',this)">All</button>
        <button class="pos-rf-btn" onclick="setRecentFilter('pos',this)">POS Only</button>
        <button class="pos-rf-btn" onclick="setRecentFilter('today',this)">Today</button>
        <button class="pos-rf-btn" onclick="setRecentFilter('pending',this)">Pending</button>
    </div>
    <div class="pos-recent-list" id="pos-recent-list">
        <div class="pos-recent-loading">Loading orders...</div>
    </div>
</div>

<div id="print-area"></div>

<!-- Bill Overlay -->
<div id="pos-bill-overlay">
    <div class="pos-bill-box" id="pos-bill-content">
        <!-- filled by JS -->
        <div class="bill-actions">
            <button class="bill-print-btn" onclick="printBill()">🖨 Print Bill</button>
            <button class="bill-new-btn" onclick="newOrder()">+ New Order</button>
        </div>
    </div>
</div>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-firestore-compat.js"></script>
<script>
firebase.initializeApp({
    apiKey: "AIzaSyCM0LIBRVreGCYBknlk_xEXoomzM3JAVBw",
    authDomain: "amogha-cafe.firebaseapp.com",
    projectId: "amogha-cafe",
    storageBucket: "amogha-cafe.firebasestorage.app",
    messagingSenderId: "1000994409697",
    appId: "1:1000994409697:web:983214bafab529d6a2fba0"
});
var db = firebase.firestore();

// ── State ────────────────────────────────────────────────────
var shopId = (new URLSearchParams(location.search)).get('shop') || null;
var shopConfig = null;
var todayTokenKey = 'posToken_' + new Date().toISOString().slice(0,10); // resets daily
var currentToken = parseInt(localStorage.getItem(todayTokenKey) || '0');

function nextToken() {
    currentToken++;
    localStorage.setItem(todayTokenKey, currentToken);
    // Clean up old token keys
    Object.keys(localStorage).forEach(function(k) {
        if (k.startsWith('posToken_') && k !== todayTokenKey) localStorage.removeItem(k);
    });
    return currentToken;
}
var allMenu = [];
var itemFrequency = {};
var cart = [];
var activeCat = 'All';
var categories = ['All'];
var payMethod = 'Cash';
// Loyalty state
var custPoints = 0;
var pointsRedeemed = false;
var POINTS_PER_RUPEE = 100 / 2000; // 100 pts per ₹2000 = 0.05 pts/₹
var REDEEM_POINTS = 100;
var REDEEM_DISCOUNT = 100;
var REDEEM_MIN_ORDER = 250;

// ── Light / Dark Mode (default: light) ──────────────────────
(function() {
    var saved = localStorage.getItem('pos_mode');
    if (saved !== 'dark') {
        document.body.classList.add('light-mode');
    }
    document.addEventListener('DOMContentLoaded', function() {
        var btn = document.getElementById('pos-mode-btn');
        if (btn) btn.textContent = document.body.classList.contains('light-mode') ? '☾' : '☀';
    });
})();
function togglePosMode() {
    var isLight = document.body.classList.toggle('light-mode');
    document.getElementById('pos-mode-btn').textContent = isLight ? '☾' : '☀';
    localStorage.setItem('pos_mode', isLight ? 'light' : 'dark');
}

// ── Clock ────────────────────────────────────────────────────
function updateClock() {
    var now = new Date();
    document.getElementById('pos-clock').textContent =
        now.toLocaleTimeString('en-IN', {hour:'2-digit',minute:'2-digit',second:'2-digit',hour12:true});
}
setInterval(updateClock, 1000); updateClock();

// ── Login ────────────────────────────────────────────────────
function posLogin() {
    var username = (document.getElementById('pos-username').value || '').trim().toLowerCase();
    var password = document.getElementById('pos-password').value;
    if (!username || !password) {
        document.getElementById('pos-login-err').textContent = 'Enter username and password.';
        return;
    }
    var btn = document.getElementById('pos-login-btn');
    btn.disabled = true;
    btn.textContent = 'Signing in…';
    document.getElementById('pos-login-err').textContent = '';

    db.collection('kiosks')
        .where('username', '==', username)
        .where('active', '==', true)
        .get()
        .then(function(snap) {
            var matched = null;
            snap.forEach(function(doc) {
                var d = doc.data();
                if (d.password === password) matched = { id: doc.id, ...d };
            });
            if (matched) {
                db.collection('shops').doc(matched.shopId).get().then(function(shopDoc) {
                    shopId = matched.shopId;
                    shopConfig = shopDoc.exists
                        ? { id: shopDoc.id, ...shopDoc.data() }
                        : { id: matched.shopId, name: matched.name || matched.shopId };
                    startPOS();
                });
            } else {
                // Legacy fallback: shopId as username + adminPin as password (migration path)
                db.collection('shops').get().then(function(shopsSnap) {
                    var legacy = null;
                    shopsSnap.forEach(function(doc) {
                        if (doc.id === username && doc.data().adminPin === password) legacy = { id: doc.id, ...doc.data() };
                    });
                    if (legacy) {
                        shopId = legacy.id;
                        shopConfig = legacy;
                        startPOS();
                    } else {
                        btn.disabled = false;
                        btn.textContent = 'Login';
                        document.getElementById('pos-login-err').textContent = 'Invalid username or password.';
                        document.getElementById('pos-password').value = '';
                        document.getElementById('pos-password').focus();
                    }
                });
            }
        }).catch(function() {
            btn.disabled = false;
            btn.textContent = 'Login';
            document.getElementById('pos-login-err').textContent = 'Connection error. Try again.';
        });
}

function posLogout() {
    if (!cart.length || confirm('Logout? Current order will be cleared.')) {
        location.reload();
    }
}

// ── Start POS ────────────────────────────────────────────────
function startPOS() {
    document.getElementById('pos-login').style.display = 'none';
    document.getElementById('pos-main').classList.add('show');
    // Apply shop branding
    if (shopConfig) {
        document.getElementById('pos-shop-name').textContent = shopConfig.name || shopId;
        document.title = 'POS | ' + (shopConfig.name || shopId);
        if (shopConfig.logo) document.getElementById('pos-logo').src = shopConfig.logo;
        if (shopConfig.theme && shopConfig.theme.gold)
            document.documentElement.style.setProperty('--gold', shopConfig.theme.gold);
    }
    loadPOSMenu();
    startSalesCounter();
    initBluetoothPrinter();
}

// ── Load Menu ────────────────────────────────────────────────
function loadPOSMenu() {
    db.collection('menu').where('shopId','==',shopId).where('available','==',true)
      .onSnapshot(function(snap) {
        allMenu = [];
        snap.forEach(function(doc) {
            var d = doc.data();
            allMenu.push({ name:d.name, price:d.price, category:d.category,
                type:d.type, badge:d.badge||'', img:d.imageUrl||'', sortOrder:d.sortOrder||999 });
        });
        allMenu.sort(function(a,b){ return a.sortOrder - b.sortOrder; });
        loadItemFrequency();
        // Build categories from shop config or menu
        var cats = ['All', '🔥 Popular'];
        if (shopConfig && shopConfig.categories && shopConfig.categories.length) {
            shopConfig.categories.forEach(function(c) {
                if (allMenu.some(function(m){ return m.category===c; }) && cats.indexOf(c)===-1) cats.push(c);
            });
        }
        allMenu.forEach(function(m) { if (cats.indexOf(m.category)===-1) cats.push(m.category); });
        categories = cats;
        renderPOSCats();
        renderPosMenu();
    }, function(err){ console.error(err); });
}

// ── Item Frequency (for Popular tab) ─────────────────────────
var FREQ_CACHE_KEY = 'posFreq_' + (shopId || 'default');
var FREQ_CACHE_TTL = 30 * 60 * 1000; // 30 minutes

function loadItemFrequency() {
    if (!shopId) return;
    // Use cached value if still fresh
    try {
        var cached = JSON.parse(sessionStorage.getItem(FREQ_CACHE_KEY) || 'null');
        if (cached && (Date.now() - cached.ts) < FREQ_CACHE_TTL) {
            itemFrequency = cached.data;
            renderPosMenu();
            return;
        }
    } catch(e) {}

    db.collection('orders')
      .where('shopId', '==', shopId)
      .orderBy('createdAt', 'desc')
      .limit(300)
      .get()
      .then(function(snap) {
          var freq = {};
          snap.forEach(function(doc) {
              var d = doc.data();
              if (d.status === 'voided' || d.status === 'cancelled') return;
              (d.items || []).forEach(function(item) {
                  freq[item.name] = (freq[item.name] || 0) + (item.qty || 1);
              });
          });
          itemFrequency = freq;
          try { sessionStorage.setItem(FREQ_CACHE_KEY, JSON.stringify({ ts: Date.now(), data: freq })); } catch(e) {}
          renderPosMenu();
      })
      .catch(function(err) { console.warn('Frequency load failed:', err); });
}

// ── Render Categories ────────────────────────────────────────
function renderPOSCats() {
    var html = '';
    categories.forEach(function(cat) {
        var count = cat === 'All' ? allMenu.length : allMenu.filter(function(m){ return m.category===cat; }).length;
        html += '<button class="pos-cat-btn' + (cat===activeCat?' active':'') +
                '" onclick="setPosCat(\'' + cat.replace(/'/g,"\\'") + '\')">' +
                escH(cat) + '<span class="pos-cat-count">' + count + '</span></button>';
    });
    document.getElementById('pos-cats').innerHTML = html;
}

function setPosCat(cat) {
    activeCat = cat;
    document.getElementById('pos-search').value = '';
    renderPOSCats();
    renderPosMenu();
}

// ── Render Menu ──────────────────────────────────────────────
var _renderMenuTimer = null;
function debouncedRenderMenu() {
    clearTimeout(_renderMenuTimer);
    _renderMenuTimer = setTimeout(renderPosMenu, 150);
}

function renderPosMenu() {
    var q = document.getElementById('pos-search').value.trim().toLowerCase();
    var items;
    if (activeCat === '🔥 Popular' && !q) {
        items = allMenu.slice().sort(function(a, b) {
            return (itemFrequency[b.name] || 0) - (itemFrequency[a.name] || 0);
        }).slice(0, 12);
    } else {
        items = allMenu.filter(function(m) {
            if (activeCat !== 'All' && activeCat !== '🔥 Popular' && m.category !== activeCat) return false;
            if (q && m.name.toLowerCase().indexOf(q) === -1) return false;
            return true;
        });
        if (activeCat === '🔥 Popular' && q) {
            items.sort(function(a, b) {
                return (itemFrequency[b.name] || 0) - (itemFrequency[a.name] || 0);
            });
        }
    }
    var html = '';
    if (!items.length) {
        html = '<div class="pos-empty">No items found</div>';
    } else {
        items.forEach(function(item) {
            var qty = cartQty(item.name);
            var sn = item.name.replace(/'/g,"\\'");
            var ctrl = qty > 0
                ? '<div class="pos-item-qc" onclick="event.stopPropagation()">' +
                  '<button class="piq-minus" onclick="changeQty(\'' + sn + '\',-1)">−</button>' +
                  '<span class="piq-num">' + qty + '</span>' +
                  '<button class="piq-plus" onclick="addPosItem(\'' + sn + '\',' + item.price + ')">+</button>' +
                  '</div>'
                : '<button class="pos-item-add" onclick="event.stopPropagation();addPosItem(\'' + sn + '\',' + item.price + ')">+</button>';
            var freq = itemFrequency[item.name] || 0;
            var freqBadge = (activeCat === '🔥 Popular' && freq > 0)
                ? '<span style="font-size:.65rem;background:rgba(212,160,23,.15);color:var(--gold);padding:1px 5px;border-radius:4px">×' + freq + ' sold</span>'
                : '';
            html += '<div class="pos-item' + (qty>0?' in-cart':'') + '">' +
                    (item.img ? '<img class="pos-item-img" src="' + item.img + '" alt="" loading="lazy">' : '') +
                    '<div class="pos-item-name">' + escH(item.name) + '</div>' +
                    '<div class="pos-item-footer">' +
                    '<div>' +
                    '<div class="pos-item-price">₹' + item.price + '</div>' +
                    '<div class="pos-item-meta"><span class="pos-item-type ' + (item.type==='non-veg'?'nv':'veg') + '"></span>' +
                    (item.badge ? '<span style="font-size:.65rem;background:rgba(212,160,23,.15);color:var(--gold);padding:1px 5px;border-radius:4px">' + escH(item.badge) + '</span>' : '') +
                    freqBadge +
                    '</div></div>' +
                    ctrl +
                    '</div></div>';
        });
    }
    document.getElementById('pos-menu-grid').innerHTML = html;
}

// ── Cart ─────────────────────────────────────────────────────
function cartQty(name) {
    var f = cart.find(function(c){ return c.name===name; });
    return f ? f.qty : 0;
}

function addPosItem(name, price) {
    var f = cart.find(function(c){ return c.name===name; });
    if (f) f.qty++; else cart.push({ name:name, price:price, qty:1 });
    renderCart();
    renderPosMenu();
}

function changeQty(name, delta) {
    var idx = cart.findIndex(function(c){ return c.name===name; });
    if (idx === -1) return;
    cart[idx].qty += delta;
    if (cart[idx].qty <= 0) cart.splice(idx, 1);
    renderCart();
    renderPosMenu();
}

function setCartQty(name, qty) {
    var idx = cart.findIndex(function(c){ return c.name===name; });
    if (idx === -1) return;
    if (qty <= 0) cart.splice(idx, 1);
    else cart[idx].qty = qty;
    renderCart();
    renderPosMenu();
}

function clearCart() {
    cart = [];
    renderCart();
    renderPosMenu();
}

function renderCart() {
    var subtotal = 0;
    cart.forEach(function(c){ subtotal += c.price * c.qty; });
    var discount = (pointsRedeemed && subtotal >= REDEEM_MIN_ORDER) ? REDEEM_DISCOUNT : 0;
    if (pointsRedeemed && subtotal < REDEEM_MIN_ORDER) { pointsRedeemed = false; discount = 0; }
    var total = Math.max(0, subtotal - discount);
    var totalDisplay = discount > 0 ? '₹' + total + ' <span style="font-size:.75rem;color:#4caf50">(-₹' + discount + ')</span>' : '₹' + total;
    document.getElementById('pos-total').innerHTML = totalDisplay;
    var count = cart.reduce(function(s,c){ return s+c.qty; }, 0);
    document.getElementById('pos-item-count').textContent = count ? '(' + count + ' items)' : '';
    document.getElementById('pos-place-btn').disabled = cart.length === 0;
    var footer = document.getElementById('pos-order-footer');
    var placeFooter = document.getElementById('pos-place-footer');
    var checkoutBar = document.getElementById('pos-checkout-bar');
    document.getElementById('pos-checkout-total').textContent = '₹' + total;
    updateLoyaltyUI(subtotal);
    if (cart.length === 0) {
        footer.style.display = 'none';
        placeFooter.style.display = 'none';
        checkoutBar.style.display = 'none';
    } else {
        // All screens: show phone/name/payment immediately
        checkoutBar.style.display = 'none';
        footer.style.display = 'block';
        placeFooter.style.display = 'block';
    }
    document.getElementById('pos-order-col').classList.toggle('has-items', cart.length > 0);
    // Mobile cart bar
    var isMobile = window.innerWidth <= 640;
    var cartBar = document.getElementById('pos-cart-bar');
    if (isMobile) {
        if (cart.length) {
            cartBar.style.display = 'block';
            document.getElementById('pos-cart-bar-label').textContent = count + ' item' + (count > 1 ? 's' : '') + ' · View Cart';
            document.getElementById('pos-cart-bar-total').textContent = '₹' + total;
        } else {
            cartBar.style.display = 'none';
            closeMobileCart();
        }
    } else {
        cartBar.style.display = 'none';
    }
    if (!cart.length) {
        document.getElementById('pos-cart-list').innerHTML = '<div class="pos-cart-empty">Cart is empty<br>Tap items to add</div>';
        return;
    }
    var html = '';
    cart.forEach(function(c) {
        var sn = c.name.replace(/'/g,"\\'");
        html += '<div class="pos-cart-item">' +
            '<div class="pos-ci-name">' + escH(c.name) + '</div>' +
            '<div class="pos-qty-ctrl">' +
            '<button class="pos-qty-btn minus" onclick="changeQty(\'' + sn + '\',-1)">−</button>' +
            '<input class="pos-qty-num" type="number" value="' + c.qty + '" min="1" max="99" ' +
                'onclick="this.select()" ' +
                'onchange="setCartQty(\'' + sn + '\',parseInt(this.value)||1)" ' +
                'onkeydown="if(event.key===\'Enter\')this.blur()">' +
            '<button class="pos-qty-btn plus" onclick="changeQty(\'' + sn + '\',1)">+</button>' +
            '</div>' +
            '<div class="pos-ci-price">₹' + (c.price * c.qty) + '</div>' +
            '</div>';
    });
    document.getElementById('pos-cart-list').innerHTML = html;
}

    document.getElementById('pos-order-col').classList.add('mobile-open');
}
function closeMobileCart() {
    document.getElementById('pos-order-col').classList.remove('mobile-open');

// ── Customer Lookup ───────────────────────────────────────────
var custLookupTimer = null;

function lookupCustomer(val) {
    var badge = document.getElementById('pos-cust-badge');
    val = val.replace(/\D/g, '').slice(0, 10);
    if (val.length < 10) {
        badge.innerHTML = '';
        custPoints = 0;
        pointsRedeemed = false;
        updateLoyaltyUI(0);
        return;
    }
    badge.innerHTML = '<span class="badge-loading">Looking up...</span>';
    clearTimeout(custLookupTimer);
    custLookupTimer = setTimeout(function() {
        db.collection('users').doc(val).get().then(function(doc) {
            var nameInput = document.getElementById('pos-cust-name');
            if (doc.exists) {
                var d = doc.data();
                custPoints = d.loyaltyPoints || 0;
                if (!nameInput.value.trim()) {
                    nameInput.value = d.name || '';
                    nameInput.style.transition = 'background 0.4s';
                    nameInput.style.background = 'rgba(212,160,23,0.18)';
                    setTimeout(function(){ nameInput.style.background = ''; }, 1200);
                }
                var visits = d.visits || 0;
                var spent = '₹' + (d.totalSpent || 0).toLocaleString('en-IN');
                var lastItems = d.lastOrderItems ? ' &nbsp;&bull;&nbsp; Last: ' + escH(d.lastOrderItems.split(',').slice(0,2).join(', ')) : '';
                var pts = custPoints > 0 ? ' &nbsp;&bull;&nbsp; 🌟 ' + custPoints + ' pts' : '';
                badge.innerHTML = '<span class="badge-found">👋 Welcome back, ' + escH(d.name || 'Customer') + '! &nbsp;&bull;&nbsp; ' + visits + ' visits &nbsp;&bull;&nbsp; ' + spent + pts + lastItems + '</span>';
            } else {
                custPoints = 0;
                badge.innerHTML = '<span class="badge-new">&#x2B; New customer &mdash; will be saved</span>';
            }
            // Refresh loyalty UI with current cart subtotal
            var subtotal = cart.reduce(function(s,c){ return s + c.price*c.qty; }, 0);
            updateLoyaltyUI(subtotal);
        }).catch(function() { badge.innerHTML = ''; });
    }, 400);
}

function updateLoyaltyUI(subtotal) {
    var row = document.getElementById('pos-loyalty-row');
    if (!row) return;
    if (custPoints >= REDEEM_POINTS) {
        row.style.display = 'block';
        if (pointsRedeemed) {
            row.innerHTML = '<div class="pos-redeemed-tag">🎁 ₹100 loyalty discount applied! <button onclick="cancelRedeem()">✕ Remove</button></div>';
        } else if (subtotal >= REDEEM_MIN_ORDER) {
            row.innerHTML = '<button class="pos-redeem-btn" onclick="redeemPoints()">🎁 Redeem ' + REDEEM_POINTS + ' pts → ₹' + REDEEM_DISCOUNT + ' off this order</button>';
        } else {
            row.innerHTML = '<div style="font-size:.75rem;color:#888;text-align:center">🌟 ' + custPoints + ' pts available — add ₹' + (REDEEM_MIN_ORDER - subtotal) + ' more to redeem ₹100 off</div>';
        }
    } else {
        row.style.display = 'none';
    }
}

function redeemPoints() {
    pointsRedeemed = true;
    renderCart();
}

function cancelRedeem() {
    pointsRedeemed = false;
    renderCart();
}

function upsertCustomer(name, phone, orderData) {
    var ph = (phone || '').replace(/\D/g, '').slice(0, 10);
    if (!ph || ph.length < 10) return;
    var now = new Date().toISOString();
    var itemNames = (orderData.items || []).map(function(i){ return i.name; }).join(', ');
    var ref = db.collection('users').doc(ph);
    var earned = orderData.pointsEarned || 0;
    var redeemed = orderData.pointsRedeemed || 0;
    ref.get().then(function(doc) {
        if (doc.exists) {
            var d = doc.data();
            var newPts = Math.max(0, (d.loyaltyPoints || 0) - redeemed + earned);
            ref.update({
                name: (name && name !== 'Walk-in') ? name : (d.name || 'Unknown'),
                visits: (d.visits || 0) + 1,
                totalSpent: (d.totalSpent || 0) + (orderData.subtotal || orderData.total || 0),
                lastOrderAt: now,
                lastOrderItems: itemNames,
                loyaltyPoints: newPts,
                updatedAt: now
            });
        } else {
            ref.set({
                name: (name && name !== 'Walk-in') ? name : 'Unknown',
                phone: ph,
                visits: 1,
                totalSpent: orderData.subtotal || orderData.total || 0,
                lastOrderAt: now,
                lastOrderItems: itemNames,
                shopId: shopId,
                loyaltyPoints: earned,
                createdAt: now,
                updatedAt: now
            });
        }
    }).catch(function(err){ console.warn('Customer upsert failed:', err); });
}

// ── Place Order ───────────────────────────────────────────────
function placeOrder() {
    if (!cart.length) return;
    var btn = document.getElementById('pos-place-btn');
    btn.disabled = true; btn.textContent = 'Placing...';
    var name = document.getElementById('pos-cust-name').value.trim() || 'Walk-in';
    var phone = document.getElementById('pos-cust-phone').value.trim();
    var table = document.getElementById('pos-table').value.trim();
    var notes = document.getElementById('pos-order-notes').value.trim();
    var subtotal = cart.reduce(function(s,c){ return s + c.price*c.qty; }, 0);
    var discount = (pointsRedeemed && subtotal >= REDEEM_MIN_ORDER) ? REDEEM_DISCOUNT : 0;
    var total = Math.max(0, subtotal - discount);
    var token = nextToken();
    var pointsEarned = Math.floor(subtotal * POINTS_PER_RUPEE);
    var orderData = {
        customer: name,
        phone: phone || 'pos',
        items: cart.map(function(c){ return { name:c.name, qty:c.qty, price:c.price }; }),
        total: total,
        subtotal: subtotal,
        discount: discount,
        pointsEarned: pointsEarned,
        pointsRedeemed: discount > 0 ? REDEEM_POINTS : 0,
        status: 'delivered',
        orderType: 'pos',
        shopId: shopId,
        payment: payMethod,
        tokenNumber: token,
        createdAt: new Date().toISOString()
    };
    if (table) orderData.tableNumber = table;
    if (notes) orderData.notes = notes;
    db.collection('orders').add(orderData).then(function(ref) {
        btn.disabled = false; btn.textContent = 'Place Order';
        currentBillOrderId = ref.id;
        currentBillData = orderData;
        // Save/update customer record for CRM
        upsertCustomer(name, phone, orderData);
        var ph = orderData.phone && orderData.phone !== 'pos' ? orderData.phone.replace(/\D/g,'') : '';
        if (ph.length >= 10) {
            showOrderConfirm(ref.id, orderData, ph);
        } else {
            showBill(ref.id, orderData);
        }
        // Print KOT after bill screen is shown so print dialog doesn't block UI
        setTimeout(function() { printKOT(); }, 300);
    }).catch(function(err) {
        alert('Order failed: ' + err.message);
        btn.disabled = false; btn.textContent = 'Place Order';
    });
}

// ESC/POS command constants
var ESC = 0x1B, GS = 0x1D, LF = 0x0A;

function escposBytes(/* ...arrays */) {
    var total = 0, i;
    for (i = 0; i < arguments.length; i++) total += arguments[i].length;
    var result = new Uint8Array(total);
    var offset = 0;
    for (i = 0; i < arguments.length; i++) {
        result.set(arguments[i] instanceof Uint8Array ? arguments[i] : new Uint8Array(arguments[i]), offset);
        offset += arguments[i].length;
    }
    return result;
}

function escposText(str) {
    // Encode text as bytes (ASCII + basic chars)
    var bytes = [];
    for (var i = 0; i < str.length; i++) {
        var c = str.charCodeAt(i);
        bytes.push(c > 127 ? 63 : c); // Replace non-ASCII with '?'
    }
    return new Uint8Array(bytes);
}

function escposInit()    { return new Uint8Array([ESC, 0x40]); }                  // Initialize printer
function escposCenterOn(){ return new Uint8Array([ESC, 0x61, 1]); }              // Center align
function escposCenterOff(){ return new Uint8Array([ESC, 0x61, 0]); }             // Left align
function escposBoldOn()  { return new Uint8Array([ESC, 0x45, 1]); }              // Bold on
function escposBoldOff() { return new Uint8Array([ESC, 0x45, 0]); }              // Bold off
function escposBigOn()   { return new Uint8Array([GS, 0x21, 0x11]); }            // Double width+height
function escposBigOff()  { return new Uint8Array([GS, 0x21, 0x00]); }            // Normal size
function escposLF()      { return new Uint8Array([LF]); }                        // Line feed
function escposCut()     { return new Uint8Array([GS, 0x56, 0x00]); }            // Full cut
function escposFeedCut() { return new Uint8Array([LF, LF, LF, GS, 0x56, 0x00]); } // Feed + cut
function escposDashes(w) {
    var n = w === 80 ? 48 : 32; // chars per line for 80mm vs 58mm
    var s = '';
    for (var i = 0; i < n; i++) s += '-';
    return escposText(s);
}
function escposDoubleDashes(w) {
    var n = w === 80 ? 48 : 32;
    var s = '';
    for (var i = 0; i < n; i++) s += '=';
    return escposText(s);
}

function escposRow(left, right, width) {
    var cols = width === 80 ? 48 : 32;
    var space = cols - left.length - right.length;
    if (space < 1) space = 1;
    var pad = '';
    for (var i = 0; i < space; i++) pad += ' ';
    return escposText(left + pad + right);
}

function buildBillEscPos(data, orderId, shopName, footer, paperWidth) {
    var w = paperWidth || 58;
    var parts = [];

    parts.push(escposInit());
    // Header
    parts.push(escposCenterOn(), escposBoldOn(), escposBigOn());
    parts.push(escposText(shopName));
    parts.push(escposLF(), escposBigOff());
    parts.push(escposText('POS Receipt'));
    parts.push(escposLF(), escposBoldOff(), escposCenterOff());
    parts.push(escposDashes(w), escposLF());

    // Order info
    var now = new Date();
    var dateStr = now.toLocaleDateString('en-IN') + ' ' + now.toLocaleTimeString('en-IN', {hour:'2-digit', minute:'2-digit', hour12:true});
    parts.push(escposRow('Order', '#' + orderId.slice(-6).toUpperCase(), w), escposLF());
    parts.push(escposRow('Date', dateStr, w), escposLF());
    if (data.customer && data.customer !== 'Walk-in') {
        parts.push(escposRow('Customer', data.customer, w), escposLF());
    }
    if (data.phone && data.phone !== 'pos') {
        parts.push(escposRow('Phone', data.phone, w), escposLF());
    }
    if (data.tableNumber) {
        parts.push(escposRow('Table', data.tableNumber, w), escposLF());
    }
    parts.push(escposDashes(w), escposLF());

    // Items
    data.items.forEach(function(item) {
        var name = item.name + ' x' + item.qty;
        var price = 'Rs.' + (item.price * item.qty);
        parts.push(escposRow(name, price, w), escposLF());
    });

    parts.push(escposDoubleDashes(w), escposLF());

    // Total
    parts.push(escposBoldOn());
    parts.push(escposRow('TOTAL', 'Rs.' + data.total, w), escposLF());
    parts.push(escposBoldOff());

    if (data.discount > 0) {
        parts.push(escposRow('Loyalty discount', '-Rs.' + data.discount, w), escposLF());
    }
    parts.push(escposRow('Payment', data.payment, w), escposLF());

    // Loyalty section
    if (data.phone && data.phone !== 'pos') {
        var earned = data.pointsEarned || 0;
        var redeemed = data.pointsRedeemed || 0;
        var newBal = Math.max(0, custPoints - redeemed + earned);
        if (earned > 0 || redeemed > 0) {
            parts.push(escposDashes(w), escposLF());
            parts.push(escposCenterOn(), escposBoldOn());
            parts.push(escposText('LOYALTY POINTS'), escposLF());
            parts.push(escposBoldOff(), escposCenterOff());
            parts.push(escposRow('Earned this visit', '+' + earned + ' pts', w), escposLF());
            if (redeemed > 0) {
                parts.push(escposRow('Redeemed', '-' + redeemed + ' pts', w), escposLF());
            }
            parts.push(escposBoldOn());
            parts.push(escposRow('Your balance', newBal + ' pts', w), escposLF());
            parts.push(escposBoldOff());
        }
    }

    // Footer
    parts.push(escposDashes(w), escposLF());
    parts.push(escposCenterOn());
    parts.push(escposText(footer), escposLF());
    parts.push(escposCenterOff());

    // Feed and cut
    parts.push(escposFeedCut());

    return escposBytes.apply(null, parts);
}

function buildKOTEscPos(data, orderId, shopName, paperWidth) {
    var w = paperWidth || 58;
    var parts = [];

    parts.push(escposInit());

    // Header
    parts.push(escposCenterOn(), escposBoldOn(), escposBigOn());
    parts.push(escposText('KOT'));
    parts.push(escposLF(), escposBigOff());
    parts.push(escposText(shopName));
    parts.push(escposLF(), escposBoldOff(), escposCenterOff());

    // Token number (large)
    var token = data.tokenNumber || '';
    if (token) {
        parts.push(escposCenterOn(), escposBigOn(), escposBoldOn());
        parts.push(escposText('T' + token));
        parts.push(escposLF(), escposBigOff(), escposBoldOff(), escposCenterOff());
    }

    parts.push(escposDoubleDashes(w), escposLF());

    // Time + table + customer
    var now = new Date();
    var timeStr = now.toLocaleTimeString('en-IN', {hour:'2-digit', minute:'2-digit', hour12:true});
    var info = timeStr;
    if (data.tableNumber) info += ' | Table ' + data.tableNumber;
    if (data.customer && data.customer !== 'Walk-in') info += ' | ' + data.customer;
    parts.push(escposCenterOn(), escposText(info), escposLF(), escposCenterOff());
    parts.push(escposDashes(w), escposLF());

    // Items (bold, larger)
    parts.push(escposBoldOn());
    data.items.forEach(function(item) {
        parts.push(escposText('[' + item.qty + ']  ' + item.name), escposLF());
    });
    parts.push(escposBoldOff());

    parts.push(escposDoubleDashes(w), escposLF());
    parts.push(escposCenterOn(), escposText('--- END ---'), escposLF(), escposCenterOff());

    parts.push(escposFeedCut());

    return escposBytes.apply(null, parts);
}

function btPrintBytes(bytes, deviceName) {
    var base64 = '';
    var chunk = 8192;
    for (var i = 0; i < bytes.length; i += chunk) {
        var slice = bytes.subarray(i, Math.min(i + chunk, bytes.length));
        for (var j = 0; j < slice.length; j++) {
            base64 += String.fromCharCode(slice[j]);
        }
    }
    base64 = btoa(base64);
    return btPrinter.print({ data: base64, deviceName: deviceName });
}

function doPrint(html) {
    var area = document.getElementById('print-area');
    area.innerHTML = html;
    // Reset layout after print dialog closes (fixes iPad Safari viewport bug)
    var afterPrint = function() {
        area.innerHTML = '';
        // Force viewport reset — Safari changes zoom/layout during print
        var vp = document.querySelector('meta[name=viewport]');
        if (vp) { var c = vp.content; vp.content = ''; vp.content = c; }
        window.removeEventListener('afterprint', afterPrint);
    };
    window.addEventListener('afterprint', afterPrint);
    setTimeout(function() { window.print(); }, 100);
}

function sendWhatsAppBill() {
    var data = currentBillData, orderId = currentBillOrderId;
    if (!data) return;
    var ph = (data.phone && data.phone !== 'pos') ? data.phone.replace(/\D/g,'') : '';
    var phoneWasNew = false;
    if (!ph || ph.length < 10) {
        ph = prompt('Enter customer phone number (10 digits):');
        if (!ph) return;
        ph = ph.replace(/\D/g,'');
        phoneWasNew = true;
    }
    if (ph.length === 10) {
        if (phoneWasNew) {
            // Link phone back to the order in Firestore + save customer record
            db.collection('orders').doc(orderId).update({ phone: ph });
            currentBillData.phone = ph;
            upsertCustomer(data.customer || 'Walk-in', ph, data);
        }
        ph = '91' + ph;
    }
    var shopName = (shopConfig && shopConfig.name) || 'Amogha Cafe';
    var now = new Date();
    var dateStr = now.toLocaleDateString('en-IN') + ', ' + now.toLocaleTimeString('en-IN', {hour:'2-digit', minute:'2-digit', hour12:true});

    // Beautiful WhatsApp bill using WA markdown
    var divider = '━━━━━━━━━━━━━━━━━━━━';
    var lines = [
        '🧾 *' + shopName + '*',
        divider
    ];
    if (data.customer && data.customer !== 'Walk-in') lines.push('👤 ' + data.customer);
    if (data.tableNumber) lines.push('🪑 Table ' + data.tableNumber);
    lines.push('🕐 ' + dateStr);
    lines.push('📋 Order #' + orderId.slice(-6).toUpperCase());
    lines.push(divider);
    data.items.forEach(function(i) {
        var amt = '₹' + (i.price * i.qty);

    });
    lines.push(divider);
    if (data.discount > 0) lines.push('🎁 Loyalty discount: -₹' + data.discount);

function startSalesCounter() {
    if (!shopId) return;
    db.collection('orders')
      .where('shopId', '==', shopId)
      .orderBy('createdAt', 'desc')
      .limit(200)
      .onSnapshot(function(snap) {
          var todayStart = new Date(); todayStart.setHours(0,0,0,0);
          var total = 0, count = 0;
          snap.forEach(function(doc) {
              var d = doc.data();
              if (d.status === 'voided' || d.status === 'cancelled') return;
              if (toJsDate(d.createdAt) < todayStart) return;
              total += d.total || 0;
              count++;
          });
          var el = document.getElementById('pos-sales-counter');
          if (el) {
              el.style.display = 'flex';
              el.style.flexDirection = 'column';
              el.style.alignItems = 'center';
              el.style.lineHeight = '1.1';
              document.getElementById('pos-sales-total').textContent = '₹' + total.toLocaleString('en-IN') + ' · ' + count;
          }
      }, function(err) { console.warn('Sales counter error:', err); });
}

}

function renderRecentOrders() {
    var todayStart = new Date(); todayStart.setHours(0,0,0,0);
    var filtered = recentOrders.filter(function(o) {
        if (recentFilter === 'pos') return o.orderType === 'pos';
        if (recentFilter === 'today') return toJsDate(o.createdAt) >= todayStart;
        if (recentFilter === 'pending') return o.status === 'pending' || o.status === 'confirmed' || o.status === 'preparing';
        return true;
    }).slice(0, 30);

    var list = document.getElementById('pos-recent-list');
    if (!filtered.length) {
        list.innerHTML = '<div class="pos-recent-empty">No orders found</div>';
        return;
    }

    list.innerHTML = filtered.map(function(o) {
        var d = toJsDate(o.createdAt);
        var timeStr = d.toLocaleTimeString('en-IN', {hour:'2-digit', minute:'2-digit', hour12:true});
        var dateStr = d.toLocaleDateString('en-IN', {day:'2-digit', month:'short'});
        var isToday = d >= (function(){ var t=new Date(); t.setHours(0,0,0,0); return t; }());
        var displayTime = isToday ? timeStr : dateStr + ' ' + timeStr;
        var itemsSummary = (o.items || []).map(function(i){ return escH(i.name) + (i.qty > 1 ? ' ×'+i.qty : ''); }).join(', ');
        var status = (o.status || 'pending').toLowerCase();
        var statusLabel = {pending:'Pending', confirmed:'Confirmed', preparing:'Preparing',
            ready:'Ready', delivered:'Delivered', cancelled:'Cancelled', voided:'Voided'}[status] || status;
        var typeHtml = o.orderType === 'pos' ? '<span class="pos-ro-type">POS</span>' : '';
        var escapedId = o.id.replace(/'/g,"\\'");
        return '<div class="pos-ro-card">' +
            '<div class="pos-ro-top">' +
                '<span class="pos-ro-id">#' + o.id.slice(-6).toUpperCase() + '</span>' +
                '<span class="pos-ro-time">' + displayTime + '</span>' +
            '</div>' +
            '<div class="pos-ro-customer">' + escH(o.customer || 'Walk-in') +
                (o.tableNumber ? ' · Table ' + escH(o.tableNumber) : '') + '</div>' +
            '<div class="pos-ro-items">' + (itemsSummary || '—') + '</div>' +
            '<div class="pos-ro-bottom">' +
                '<span class="pos-ro-total">₹' + (o.total || 0) + '</span>' +
                typeHtml +
                '<span class="pos-ro-status ' + status + '">' + statusLabel + '</span>' +
                '<span class="pos-ro-pay">' + escH(o.payment || 'Cash') + '</span>' +
                '<button class="pos-ro-reprint" onclick="reprintOrder(\'' + escapedId + '\')">🖨 Reprint</button>' +
                (status !== 'voided' && status !== 'cancelled' ? '<button class="pos-ro-void" onclick="voidOrder(\'' + escapedId + '\')">🚫 Void</button>' : '') +
            '</div>' +
        '</div>';
    }).join('');
}

function reprintOrder(orderId) {
    var o = recentOrders.find(function(r){ return r.id === orderId; });
    if (!o) return;
    showBill(o.id, o, true);
}

function voidOrder(orderId) {
    var o = recentOrders.find(function(r){ return r.id === orderId; });
    if (!o) return;
    var label = '#' + orderId.slice(-6).toUpperCase() + ' — ₹' + (o.total || 0);
    if (!confirm('Void order ' + label + '?\n\nThis will mark it as voided and reverse any loyalty points.')) return;

    db.collection('orders').doc(orderId).update({
        status: 'voided',
        voidedAt: new Date().toISOString()
    }).then(function() {
        // Reverse loyalty points if applicable
        var phone = o.phone;
        var earned = o.pointsEarned || 0;
        var redeemed = o.pointsRedeemed || 0;
        if (phone && (earned > 0 || redeemed > 0)) {
            db.collection('users').doc(phone).get().then(function(doc) {
                if (!doc.exists) return;
                var curPts = doc.data().loyaltyPoints || 0;
                // Reverse: subtract earned points, restore redeemed points
                var newPts = Math.max(0, curPts - earned + redeemed);
                db.collection('users').doc(phone).update({ loyaltyPoints: newPts });
            });
        }
        // Update local list
        var idx = recentOrders.findIndex(function(r){ return r.id === orderId; });
        if (idx !== -1) { recentOrders[idx].status = 'voided'; }
        renderRecentOrders();
    }).catch(function(err) {
        alert('Failed to void order: ' + err.message);
    });
}
</script>
</body>
