name: Deploy to Firebase

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  test-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install functions dependencies
        run: cd functions && npm ci

      - name: Run tests
        run: npm test -- --run

      - name: Run functions tests
        run: cd functions && npm test

      - name: Deploy to Firebase Hosting, Firestore rules, and Cloud Functions
        run: npx firebase-tools deploy --only hosting,firestore:rules,functions --token "$FIREBASE_TOKEN" --project amogha-cafe
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}
